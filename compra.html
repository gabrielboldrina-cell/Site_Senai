<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizando</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="sweeatlert.js"></script>
    <link rel="icon" type="image/png" href="data/branding/capa.png">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="compra.css">
</head>

<body>
    <nav class="navbar navbar-dark site-navbar" aria-label="Main navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="GL Street.html">GL Street</a>
            <div class="ms-auto site-nav-actions">
                <a class="site-nav-link" href="GL Street.html">Inicio</a>
                <a class="site-nav-link" href="home.html">Catalogo</a>
                <div class="dropdown">
                    <button class="btn btn-dropdown-custom dropdown-toggle" type="button" data-bs-toggle="dropdown"
                        aria-expanded="false">Categorias</button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="home.html">Selecao Brasileira</a></li>
                        <li><a class="dropdown-item" href="home.html">Camisas</a></li>
                        <li><a class="dropdown-item" href="home.html">Tenis</a></li>
                        <li><a class="dropdown-item" href="home.html">Chuteiras</a></li>
                    </ul>
                </div>
                <a href="carinho.html" class="site-cart-link">Carrinho <span id="contador"></span></a>
            </div>
        </div>
    </nav>

    <div class="checkout-wrapper">
        <table>
            <thead>
                <tr>
                    <th colspan="2">Dados do Pagamento</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><label>Valor da Compra:</label></td>
                    <td><input type="number" step="0.01" placeholder="R$ 100,00" required></td>
                </tr>
                <tr>
                    <td><label>Nº do Cartão:</label></td>
                    <td><input type="text" maxlength="19" placeholder="0000 0000 0000 0000" required></td>
                </tr>
                <tr>
                    <td><label>Nome no Cartão:</label></td>
                    <td><input type="text" placeholder="..." required></td>
                </tr>
                <tr>
                    <td><label>Validade:</label></td>
                    <td class="parcelas">
                        <input type="text" maxlength="5" placeholder="MM/AA">
                        <input type="text" maxlength="4" placeholder="CVV">
                    </td>
                </tr>
                <tr>
                    <td><label>Parcelas:</label></td>
                    <td>
                        <select required>
                            <option value="">Escolha...</option>
                            <option value="1">1x - A Vista</option>
                            <option value="2">2x - Sem Juros</option>
                            <option value="3">3x - Sem Juros</option>
                            <option value="6">6x - Sem Juros</option>
                            <option value="12">12x - Sem Juros</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <button class="btn btn-sm btn-danger w-100" id="btncompra">Confirmar Pagamento</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
